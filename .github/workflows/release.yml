name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 全局环境变量：请在此配置你的码云（Gitee）信息
env:
  GITEE_OWNER: 'yibingzhi'           # 码云用户名或组织空间名
  GITEE_REPO: 'tong-yun-planner'     # 码云仓库路径名

jobs:
  build-apps:
    permissions: write-all
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            os: 'windows'
          - platform: 'macos-latest'
            os: 'macos'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'TongYun Planner v__VERSION__'
          releaseBody: 'TongYun Planner - 橦云手账 v__VERSION__ 发布啦！本产品纯 Vibe coding 产物。'
          releaseDraft: false
          prerelease: false

      - name: Mirror to Gitee Releases
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            # 查找 Windows 下生成的 .msi 和 .exe 安装包
            MSI_FILE=$(find src-tauri/target/release/bundle/msi -name "*.msi" | head -n 1)
            EXE_FILE=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -n 1)
            echo "Found MSI: $MSI_FILE"
            echo "Found EXE: $EXE_FILE"
            node scripts/upload_to_gitee.js "${{ env.GITEE_OWNER }}" "${{ env.GITEE_REPO }}" "${{ github.ref_name }}" "TongYun Planner ${{ github.ref_name }}" "TongYun Planner - 橦云手账 v${{ github.ref_name }} 发布啦！本产品纯 Vibe coding 产物。" "$MSI_FILE" "$EXE_FILE"
          
          elif [ "${{ matrix.os }}" = "macos" ]; then
            # 查找 macOS 下生成的 .dmg 和 .app.tar.gz 压缩包
            DMG_FILE=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -n 1)
            APP_FILE=$(find src-tauri/target/release/bundle/macos -name "*.app.tar.gz" | head -n 1)
            echo "Found DMG: $DMG_FILE"
            echo "Found APP bundle: $APP_FILE"
            node scripts/upload_to_gitee.js "${{ env.GITEE_OWNER }}" "${{ env.GITEE_REPO }}" "${{ github.ref_name }}" "TongYun Planner ${{ github.ref_name }}" "TongYun Planner - 橦云手账 v${{ github.ref_name }} 发布啦！本产品纯 Vibe coding 产物。" "$DMG_FILE" "$APP_FILE"
          fi

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 全局环境变量：请在此配置你的码云（Gitee）信息
env:
  GITEE_OWNER: 'your_gitee_username' # ⚠️ 请在此处修改为你的码云用户名或组织空间名
  GITEE_REPO: 'tongyun-planner'      # ⚠️ 请在此处修改为你的码云仓库路径名

jobs:
  build-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Desktop App
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'TongYun Planner v__VERSION__'
          releaseBody: 'TongYun Planner - 橦云手账 v__VERSION__ 发布啦！本产品纯 Vibe coding 产物。'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Mirror to Gitee Releases (Windows)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        shell: bash
        run: |
          # 查找生成的 .msi 和 .exe 安装包文件
          MSI_FILE=$(find src-tauri/target/release/bundle/msi -name "*.msi" | head -n 1)
          EXE_FILE=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -n 1)
          echo "Found MSI: $MSI_FILE"
          echo "Found EXE: $EXE_FILE"
          
          # 执行 Gitee 上传脚本
          node scripts/upload_to_gitee.js "${{ env.GITEE_OWNER }}" "${{ env.GITEE_REPO }}" "${{ github.ref_name }}" "TongYun Planner ${{ github.ref_name }}" "TongYun Planner - 橦云手账 v${{ github.ref_name }} 发布啦！本产品纯 Vibe coding 产物。" "$MSI_FILE" "$EXE_FILE"

  build-ios:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim

      - name: Install dependencies
        run: npm ci

      - name: Initialize Tauri iOS (if not already done)
        run: |
          if [ ! -d "src-tauri/gen/apple" ]; then
            npx tauri ios init --non-interactive
          fi

      - name: Build iOS App
        run: |
          npx tauri ios build --no-signing

      - name: Package iOS App (.app)
        run: |
          cd src-tauri/gen/apple/build/Build/Products/Release-iphoneos/
          zip -r TongYunPlanner_iOS.zip TongYun_Planner.app
          mv TongYunPlanner_iOS.zip ../../../../../../../../TongYunPlanner_iOS.zip

      - name: Upload iOS Artifact to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: TongYunPlanner_iOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror to Gitee Releases (iOS)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          node scripts/upload_to_gitee.js "${{ env.GITEE_OWNER }}" "${{ env.GITEE_REPO }}" "${{ github.ref_name }}" "TongYun Planner ${{ github.ref_name }}" "TongYun Planner - 橦云手账 v${{ github.ref_name }} 发布啦！本产品纯 Vibe coding 产物。" "TongYunPlanner_iOS.zip"
